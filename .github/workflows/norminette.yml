name: Norminette

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  norminette:
    runs-on: ubuntu-latest
    outputs:
      norm_output: ${{ steps.norminette.outputs.output }}
    steps:
      - uses: actions/checkout@v3

      - name: Install norminette
        run: pip install norminette

      - name: Run norminette
        id: norminette
        run: |
          set +e
          OUTPUT=$(norminette 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          {
            echo "output<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          exit $EXIT_CODE

  notify:
    needs: norminette
    if: always()
    uses: ./.github/workflows/notify-discord.yml
    with:
      job_status: ${{ needs.norminette.result }}
      norm_output: ${{ needs.norminette.outputs.norm_output }}
    secrets: inherit
